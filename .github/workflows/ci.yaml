name: Java CI

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**/*.java'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**/*.java'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin' 

      - name: Compile all source files
        run: |
          find src -name "*.java" > sources.txt
          javac @sources.txt
